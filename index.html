const PERIYOD = 60; // 5 yıllık günlük fiyat geçmişi (volatilite/drawdown için daha sağlam)

function parseTefasResult(data) {
  const list = data && Array.isArray(data.resultList) ? data.resultList : [];
  if (!list.length) return null;
  const history = list
    .map((x) => ({ date: String(x.tarih).slice(0, 10), price: Number(x.fiyat) }))
    .filter((h) => h.date && h.price > 0)
    .sort((a, b) => a.date.localeCompare(b.date));
  if (!history.length) return null;
  const latest = history[history.length - 1];
  return { price: latest.price, date: latest.date, name: (list[0] && list[0].fonUnvan) || null, history };
}

async function fetchTefasFund(code) {
  try {
    const base = CUSTOM_PROXY.replace(/\/+$/, '');
    const sep = base.includes('?') ? '&' : '?';
    const res = await fetch(`${base}${sep}fon=${encodeURIComponent(code)}&periyod=${PERIYOD}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if (d && Number(d.price) > 0) {
      const history = Array.isArray(d.history) && d.history.length
        ? d.history.map((h) => ({ date: h.date, price: Number(h.price) })).filter((h) => h.price > 0)
        : [{ date: d.date, price: Number(d.price) }];
      return { price: Number(d.price), date: d.date, name: d.name || null, history };
    }
  } catch (e) { /* yut */ }
  return null;
}

/* ===== Türkçe/İngilizce sayı ayrıştırıcı =====
   "252.357.855,33" -> 252357855.33 | "382,602379" -> 382.602379 | "1,234.56" -> 1234.56 */
function parseTRNumber(raw) {
  if (raw == null) return NaN;
  let s = String(raw).trim().replace(/[₺\s]/g, '');
  if (s === '') return NaN;
  const hasDot = s.includes('.'), hasComma = s.includes(',');
  if (hasDot && hasComma) {
    if (s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g, '').replace(',', '.'); // TR: nokta binlik, virgül ondalık
    else s = s.replace(/,/g, ''); // EN: virgül binlik, nokta ondalık
  } else if (hasComma) {
    s = s.replace(/,/g, '.'); // tek virgül = ondalık
  } else if (hasDot) {
    if (s.split('.').length > 2) s = s.replace(/\./g, ''); // 252.357.855 = binlik
    // tek nokta => ondalık kabul, dokunma (382.602379)
  }
  s = s.replace(/[^0-9.\-]/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? NaN : n;
}

/* ===== Getiri hesaplama yardımcıları ===== */
const minusMonths = (iso, n) => { const d = new Date(iso); d.setMonth(d.getMonth() - n); return d.toISOString().slice(0, 10); };
const minusDays = (iso, n) => { const d = new Date(iso); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); };
// hist ARTAN sıralı; tarihi <= target olan SON kayıt
const priceOnOrBefore = (hist, target) => { let r = null; for (const h of hist) { if (h.date <= target) r = h; else break; } return r; };
// tarihi >= target olan İLK kayıt
const firstOnOrAfter = (hist, target) => { for (const h of hist) { if (h.date >= target) return h; } return null; };

function computeReturns(hist) {
  if (!hist || hist.length < 2) return null;
  const latest = hist[hist.length - 1];
  const prev = hist[hist.length - 2];
  const year = latest.date.slice(0, 4);
  const pct = (baseEntry) => {
    if (!baseEntry || !baseEntry.value) return null;
    return ((latest.value - baseEntry.value) / baseEntry.value) * 100;
  };
  return {
    son: latest,
    gunluk: pct(prev),
    hafta: pct(priceOnOrBefore(hist, minusDays(latest.date, 7)) || hist[0]),
    ay1: pct(priceOnOrBefore(hist, minusMonths(latest.date, 1)) || hist[0]),
    ay3: pct(priceOnOrBefore(hist, minusMonths(latest.date, 3)) || hist[0]),
    ay6: pct(priceOnOrBefore(hist, minusMonths(latest.date, 6)) || hist[0]),
    ytd: pct(firstOnOrAfter(hist, `${year}-01-01`) || hist[0]),
    yil1: pct(priceOnOrBefore(hist, minusMonths(latest.date, 12)) || hist[0]),
  };
}

function filterByPeriod(hist, period) {
  if (!hist || !hist.length) return [];
  const latest = hist[hist.length - 1];
  let cutoff;
  if (period === 'w') cutoff = minusDays(latest.date, 7);
  else if (period === 'm') cutoff = minusMonths(latest.date, 1);
  else if (period === '3m') cutoff = minusMonths(latest.date, 3);
  else if (period === '6m') cutoff = minusMonths(latest.date, 6);
  else if (period === 'ytd') cutoff = `${latest.date.slice(0, 4)}-01-01`;
  else cutoff = minusMonths(latest.date, 12); // 1y
  return hist.filter((h) => h.date >= cutoff);
}

/* ===== Basit SVG fiyat grafiği (dış kütüphane yok) ===== */
function PriceChart({ data }) {
  if (!data || data.length < 2) return <div className="text-sm text-slate-400 italic py-16 text-center">Grafik için yeterli veri yok.</div>;
  const W = 820, H = 320, padL = 64, padR = 18, padT = 18, padB = 38;
  const vals = data.map((d) => d.value);
  let min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) { min *= 0.999; max *= 1.001; }
  const xAt = (i) => padL + (W - padL - padR) * (data.length === 1 ? 0 : i / (data.length - 1));
  const yAt = (v) => padT + (H - padT - padB) * (1 - (v - min) / (max - min));
  const pts = data.map((d, i) => `${xAt(i).toFixed(1)},${yAt(d.value).toFixed(1)}`).join(' ');
  const area = `${xAt(0).toFixed(1)},${H - padB} ${pts} ${xAt(data.length - 1).toFixed(1)},${H - padB}`;
  const up = data[data.length - 1].value >= data[0].value;
  const stroke = up ? '#059669' : '#e11d48';
  const fill = up ? 'rgba(5,150,105,0.10)' : 'rgba(225,29,72,0.10)';
  const fmtN = (v) => v.toLocaleString('tr-TR', { maximumFractionDigits: 4 });
  const fmtD = (s) => new Date(s).toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  const yTicks = [max, (max + min) / 2, min];
  const xIdx = [0, Math.floor((data.length - 1) / 2), data.length - 1];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block' }}>
      {yTicks.map((v, i) => {
        const y = yAt(v);
        return (
          <g key={i}>
            <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="#e2e8f0" strokeWidth="1" />
            <text x={padL - 8} y={y + 4} textAnchor="end" fontSize="11" fill="#94a3b8">{fmtN(v)}</text>
          </g>
        );
      })}
      <polygon points={area} fill={fill} />
      <polyline points={pts} fill="none" stroke={stroke} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {xIdx.map((i, k) => (
        <text key={k} x={xAt(i)} y={H - padB + 22} textAnchor={k === 0 ? 'start' : k === xIdx.length - 1 ? 'end' : 'middle'} fontSize="11" fill="#94a3b8">{fmtD(data[i].date)}</text>
      ))}
    </svg>
  );
}

  const [detailFund, setDetailFund] = useState(null); // açık fon detayı
  const [detailHist, setDetailHist] = useState(null); // detay fiyat geçmişi [{date,value}]

  const [derinInfo, setDerinInfo] = useState(false); // Risk & Performans: metrik açıklama kutusu açık mı

  const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', onConfirm: null, isAlert: true });
  const [isFetching, setIsFetching] = useState(false);

  const showAlert = (title, message) => setModalConfig({ isOpen: true, title, message, onConfirm: null, isAlert: true });
  const showConfirm = (title, message, onConfirm) => setModalConfig({ isOpen: true, title, message, onConfirm, isAlert: false });

  const calculatedQty = useMemo(() => {
    const p = parseTRNumber(txPrice), t = parseTRNumber(txTotalAmount);
    if (!isNaN(p) && !isNaN(t) && p > 0) return (t / p).toFixed(6);
    return '0.000000';
  }, [txPrice, txTotalAmount]);

  const portfolio = useMemo(() => {
    const holdings = {};
    transactions.forEach((t) => {
      if (!holdings[t.fundCode]) holdings[t.fundCode] = { code: t.fundCode, quantity: 0, totalCost: 0 };
      const h = holdings[t.fundCode];
      const qty = parseFloat(t.quantity), prc = parseFloat(t.price);
      if (t.type === 'buy') { h.quantity += qty; h.totalCost += qty * prc; }
      else if (t.type === 'sell') { const avgCost = h.quantity > 0 ? h.totalCost / h.quantity : 0; h.quantity -= qty; h.totalCost -= qty * avgCost; }
    });
    return Object.values(holdings).filter((h) => h.quantity > 0.001).map((h) => {
      const avgCost = h.totalCost / h.quantity;
      const marketData = marketPrices[h.code] || { value: avgCost, date: null };
      const currentValue = h.quantity * marketData.value;
      const profitLoss = currentValue - h.totalCost;

      return { ...h, name: fundDetails ? fundDetails.name : '', avgCost, currentPrice: marketData.value, priceDate: marketData.date, currentValue, profitLoss, profitLossPercent: h.totalCost > 0 ? (profitLoss / h.totalCost) * 100 : 0 };

  // Seçili fonda elde tutulan net pay adedi (alış - satış)
  const heldShares = useMemo(() => {

  // Satış modunda fon seçilince/moda geçilince adedi elindeki adetle doldur
  useEffect(() => {

  // Satış tutarı = satılacak adet × satış fiyatı (otomatik)
  const sellAmount = useMemo(() => {

  const summary = useMemo(() => {

  // ===== Yuvarlanan bakiye pozisyonları (Excel "İşlemdeki fon bakiyesi" mantığı) =====
  // Her fon için: pozisyon satılana kadar bakiye her kapanışta bileşik büyür; alımlar ekler, satışlar düşer.
  const positions = useMemo(() => {
    const codes = [...new Set(transactions.map((t) => t.fundCode))];
    const out = [];
    codes.forEach((code) => {
      const txs = transactions.filter((t) => t.fundCode === code).slice().sort((a, b) => a.date.localeCompare(b.date));
      if (!txs.length) return;
      const fund = definedFunds.find((f) => f.code === code);
      const firstBuy = txs[0].date;
      // Dönem içinde tutulan pay adedi (tarih <= d olan alış - satış)
      const sharesAsOf = (d) => txs.reduce((s, t) => (t.date <= d ? s + (t.type === 'buy' ? t.quantity : -t.quantity) : s), 0);
      // Zaman çizelgesi: fiyat kapanışları + işlem tarihleri (alış/satış). Böylece her işlem bir satır sınırı olur.
      const valueByDate = new Map();
      (priceHistory[code] || []).forEach((h) => { if (h.date >= firstBuy) valueByDate.set(h.date, h.value); });
      if (!valueByDate.has(firstBuy)) valueByDate.set(firstBuy, txs[0].price);
      txs.forEach((t) => { if (t.date >= firstBuy && !valueByDate.has(t.date)) valueByDate.set(t.date, t.price); });
      const closes = Array.from(valueByDate.keys()).sort((a, b) => a.localeCompare(b)).map((d) => ({ date: d, value: valueByDate.get(d) }));

      const ledger = [];
      for (let i = 1; i < closes.length; i++) {
        const prev = closes[i - 1], cur = closes[i];
        const sharesDuring = sharesAsOf(prev.date);
        if (sharesDuring <= 0.000001) continue;
        const D = sharesDuring * prev.value;          // İşlemdeki fon bakiyesi (dönem başı)
        const gain = sharesDuring * (cur.value - prev.value); // Kazanç
        const J = D + gain;                            // Toplam Tutar (dönem sonu)
        const gun = Math.max(1, Math.round((new Date(cur.date) - new Date(prev.date)) / 86400000));
        const oran = prev.value > 0 ? ((cur.value / prev.value - 1) * 365) / gun * 100 : 0;
        // Alış: başladığı satırda (bas) görünür. Satış: bittiği satırda (bit) görünür.
        const txsOnBas = txs.filter((t) => (t.type === 'buy' && t.date === prev.date) || (t.type === 'sell' && t.date === cur.date));
        ledger.push({ bas: prev.date, bit: cur.date, D, acilis: prev.value, kapanis: cur.value, gun, oran, gain, J, adet: sharesDuring, txsOnBas });
      }

      const netShares = sharesAsOf(closes[closes.length - 1].date);
      const lastClose = closes[closes.length - 1];
      const guncel = lastClose.value;
      const bakiye = netShares * guncel;
      const kazanc = ledger.reduce((s, r) => s + r.gain, 0);

  const detailRisk = useMemo(() => {
    const s = detailHist; if (!s || s.length < 20) return null;
    const rets = [];
    for (let i = 1; i < s.length; i++) { const p0 = s[i - 1].value, p1 = s[i].value; if (p0 > 0 && p1 > 0) rets.push(p1 / p0 - 1); }
    if (rets.length < 15) return null;
    const mean = rets.reduce((a, b) => a + b, 0) / rets.length;
    const sd = Math.sqrt(rets.reduce((a, b) => a + (b - mean) * (b - mean), 0) / rets.length);
    const annVol = sd * Math.sqrt(252) * 100;
    const days = (new Date(s[s.length - 1].date) - new Date(s[0].date)) / 86400000;
    const years = days / 365;
    const totRet = s[s.length - 1].value / s[0].value;
    const RpAnnual = years > 0.05 ? (Math.pow(totRet, 1 / years) - 1) * 100 : null;
    let peak = s[0].value, maxDD = 0, ddDate = '';
    s.forEach((d) => { if (d.value > peak) peak = d.value; const dd = (d.value - peak) / peak * 100; if (dd < maxDD) { maxDD = dd; ddDate = d.date; } });
    const rf = parseFloat(rfRate) || 0;
    const rfDaily = Math.pow(1 + rf / 100, 1 / 252) - 1;
    const excess = RpAnnual != null ? RpAnnual - rf : null;
    const downSq = rets.reduce((a, b) => { const d = Math.min(0, b - rfDaily); return a + d * d; }, 0) / rets.length;
    const annDown = Math.sqrt(downSq) * Math.sqrt(252) * 100;
    const sharpe = (excess != null && annVol > 0.0001) ? excess / annVol : null;
    const sortino = (excess != null && annDown > 0.0001) ? excess / annDown : null;
    return { annVol, RpAnnual, maxDD, ddDate, sharpe, sortino, n: s.length, start: s[0].date, end: s[s.length - 1].date };
  }, [detailHist, rfRate]);

  const fmtCur = (v) => new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(v);

  const reportReturns = useMemo(() => computeReturns(reportHist), [reportFund, priceHistory]);
  const reportChartData = useMemo(() => filterByPeriod(reportHist, reportPeriod), [reportFund, reportPeriod, priceHistory]);
  const reportFundName = (definedFunds.find((f) => f.code === reportFund) || {}).name || '';

    const rows = [['Tarih', 'Fiyat (TL)', 'Günlük Getiri (%)']];

    } catch (e) {

  const fmtPct = (v) => (v == null ? '-' : `${v > 0 ? '+' : ''}${v.toLocaleString('tr-TR', { maximumFractionDigits: 2 })}%`);

  // ===== Fon Tarayıcı mantığı =====
  const fetchScreener = async () => {

  // Rapor sekmesi ilk açıldığında otomatik getir
  useEffect(() => {

  }, [activeTab]);

  const ownedCodes = useMemo(() => {
    const s = new Set();

  const scrTypes = useMemo(() => {

  }, [scrFunds]);

  const scrFiltered = useMemo(() => {

    if (scrType !== 'Tümü') list = list.filter((f) => tr(f.tur).includes(tr(scrType)));
    if (scrStatus === 'trading') list = list.filter((f) => f.tefas);
    else if (scrStatus === 'nontrading') list = list.filter((f) => !f.tefas);
    const q = tr(scrSearch).trim();
    if (q) list = list.filter((f) => tr(f.kod).includes(q) || tr(f.ad).includes(q));
    const { key, dir } = scrSort;
    const isText = key === 'kod' || key === 'ad' || key === 'tur';
    return [...list].sort((a, b) => {
      const va = a[key], vb = b[key];
      if (isText) return dir === 'asc' ? String(va).localeCompare(String(vb), 'tr') : String(vb).localeCompare(String(va), 'tr');
      if (va == null && vb == null) return 0;
      if (va == null) return 1;     // boş getiriler her zaman sona

  const scrSortBy = (key) => setScrSort((s) => (s.key === key ? { key, dir: s.dir === 'desc' ? 'asc' : 'desc' } : { key, dir: 'desc' }));

  // FON ANALİZ — seçilen türe göre tüm hesaplar (canlı scrFunds verisinden)
  const analiz = useMemo(() => {
    const trl = (x) => (x || '').toLocaleLowerCase('tr');
    const inCat = scrFunds.filter((f) => (anType === 'Tümü' ? true : trl(f.tur).includes(trl(anType))));
    const withRet = inCat.filter((f) => f.g1y != null);
    const vals = withRet.map((f) => f.g1y).sort((a, b) => a - b);
    const n = vals.length;
    const mean = n ? vals.reduce((s, v) => s + v, 0) / n : null;
    const median = n ? (n % 2 ? vals[(n - 1) / 2] : (vals[n / 2 - 1] + vals[n / 2]) / 2) : null;
    const sorted = [...withRet].sort((a, b) => b.g1y - a.g1y);
    const best = sorted[0] || null;
    const worst = sorted.length ? sorted[sorted.length - 1] : null;
    const top5 = sorted.slice(0, 5);
    const risk = [1, 2, 3, 4, 5, 6, 7].map((t) => {
      const r = withRet.filter((f) => String(f.risk) === String(t));
      return r.length ? r.reduce((s, f) => s + f.g1y, 0) / r.length : null;
    });
    // Tutarlılık için kategori içi üst %25 eşiği (her dönem)
    const pct75 = (arr) => { const a = arr.filter((v) => v != null).sort((x, y) => x - y); return a.length ? a[Math.floor(a.length * 0.75)] : null; };
    const th = { g1a: pct75(inCat.map((f) => f.g1a)), g3a: pct75(inCat.map((f) => f.g3a)), g6a: pct75(inCat.map((f) => f.g6a)), g1y: pct75(inCat.map((f) => f.g1y)) };
    const mom = top5.map((f) => {
      const shortAnn = f.g1a != null ? f.g1a * 12 : null; // 1A yıllıklandırılmış (basit)
      const lng = f.g1y;
      let state = 'flat';
      if (shortAnn != null && lng != null) { if (shortAnn > lng * 1.1) state = 'up'; else if (shortAnn < lng * 0.9) state = 'down'; }
      let cons = 0, tot = 0;
      [['g1a', f.g1a], ['g3a', f.g3a], ['g6a', f.g6a], ['g1y', f.g1y]].forEach(([k, v]) => { if (th[k] != null) { tot++; if (v != null && v >= th[k]) cons++; } });
      return { kod: f.kod, ad: f.ad, shortAnn, lng, state, cons, tot };
    });
    return { count: inCat.length, n, mean, median, best, worst, top5, risk, mom };
  }, [scrFunds, anType]);

  const anTypeOptions = useMemo(() => {

  }, [scrFunds]);

  // RİSK & PERFORMANS → Risk Metrikleri — fonun günlük fiyat geçmişinden volatilite + Max Drawdown
  const derin = useMemo(() => {
    const out = [];
    Object.keys(priceHistory || {}).forEach((code) => {
      const series = [...(priceHistory[code] || [])].filter((p) => p && p.value > 0).sort((a, b) => a.date.localeCompare(b.date));
      const name = (definedFunds.find((d) => d.code === code) || {}).name || '';
      if (series.length < 5) { out.push({ code, name, n: series.length, insufficient: true }); return; }
      // Günlük getiriler
      const rets = [];
      for (let i = 1; i < series.length; i++) rets.push(series[i].value / series[i - 1].value - 1);
      const mean = rets.reduce((s, v) => s + v, 0) / rets.length;
      const variance = rets.reduce((s, v) => s + (v - mean) ** 2, 0) / (rets.length - 1);
      const sdDaily = Math.sqrt(variance);
      const volAnnual = sdDaily * Math.sqrt(252) * 100; // yıllıklandırılmış oynaklık (%)
      // Max Drawdown (zirveden dibe en büyük düşüş)
      let peak = series[0].value, peakDate = series[0].date, mdd = 0, mddPeak = series[0].date, mddTrough = series[0].date;
      for (const p of series) {
        if (p.value > peak) { peak = p.value; peakDate = p.date; }
        const dd = (p.value - peak) / peak;
        if (dd < mdd) { mdd = dd; mddPeak = peakDate; mddTrough = p.date; }
      }
      // Toplam dönem getirisi (bilgi amaçlı)
      const totalRet = (series[series.length - 1].value / series[0].value - 1) * 100;
      out.push({ code, name, n: series.length, start: series[0].date, end: series[series.length - 1].date, volAnnual, mdd: mdd * 100, mddPeak, mddTrough, totalRet });
    });
    return out.sort((a, b) => (a.insufficient ? 1 : 0) - (b.insufficient ? 1 : 0) || (b.volAnnual || 0) - (a.volAnnual || 0));
  }, [priceHistory, definedFunds]);

  // RİSK & PERFORMANS → Risk-Ayarlı Getiri (Sharpe + Sortino), seçilen pencere + kullanıcı Rf'si
  const riskAdj = useMemo(() => {
    const rf = parseTRNumber(rfRate); // yıllık %
    const rfOk = !isNaN(rf) && rf >= 0;
    const out = [];
    Object.keys(priceHistory || {}).forEach((code) => {
      let series = [...(priceHistory[code] || [])].filter((p) => p && p.value > 0).sort((a, b) => a.date.localeCompare(b.date));
      if (series.length >= 2) {
        const endD = new Date(series[series.length - 1].date);
        const cut = new Date(endD); cut.setFullYear(cut.getFullYear() - raWindow);
        const cutISO = cut.toISOString().split('T')[0];
        series = series.filter((p) => p.date >= cutISO);
      }
      const name = (definedFunds.find((d) => d.code === code) || {}).name || '';
      if (!rfOk) { out.push({ code, name, n: series.length, noRf: true }); return; }
      if (series.length < 20) { out.push({ code, name, n: series.length, insufficient: true }); return; }
      const rets = []; for (let i = 1; i < series.length; i++) rets.push(series[i].value / series[i - 1].value - 1);
      const nR = rets.length;
      const RpAnnual = (Math.pow(series[series.length - 1].value / series[0].value, 252 / nR) - 1) * 100;
      const meanD = rets.reduce((s, v) => s + v, 0) / nR;
      const sdDaily = Math.sqrt(rets.reduce((s, v) => s + (v - meanD) ** 2, 0) / (nR - 1));
      const annVol = sdDaily * Math.sqrt(252) * 100;
      const marD = rf / 100 / 252; // günlük hedef (risksiz) getiri
      const downSq = rets.reduce((s, v) => { const d = Math.min(0, v - marD); return s + d * d; }, 0) / nR;
      const annDown = Math.sqrt(downSq) * Math.sqrt(252) * 100;
      const excess = RpAnnual - rf;
      const sharpe = annVol > 0.0001 ? excess / annVol : null;
      let sortino = null, sortinoInf = false;
      if (annDown > 0.0001) sortino = excess / annDown;
      else if (excess > 0) sortinoInf = true;
      out.push({ code, name, n: series.length, start: series[0].date, end: series[series.length - 1].date, RpAnnual, annVol, annDown, sharpe, sortino, sortinoInf, excess });
    });
    return out.sort((a, b) => (a.insufficient || a.noRf ? 1 : 0) - (b.insufficient || b.noRf ? 1 : 0) || ((b.sharpe == null ? -99 : b.sharpe) - (a.sharpe == null ? -99 : a.sharpe)));
  }, [priceHistory, definedFunds, rfRate, raWindow]);

  const fmtPct2 = (v) => (v == null ? '—' : (v < 0 ? '-' : '') + '%' + Math.abs(v).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));

  // Volatiliteye göre risk profili etiketi
  const derinProfil = (v) => {
    if (v == null) return { label: '—', cls: 'bg-slate-100 text-slate-500' };
    if (v < 2) return { label: 'İstikrarlı', cls: 'bg-emerald-100 text-emerald-700' };
    if (v < 10) return { label: 'Dengeli', cls: 'bg-sky-100 text-sky-700' };
    if (v < 25) return { label: 'Dalgalı', cls: 'bg-amber-100 text-amber-700' };
    return { label: 'Agresif', cls: 'bg-rose-100 text-rose-700' };
  };

  // Fonun değerlerine göre dinamik yorum üretir (yatırım tavsiyesi değil, betimleyici)
  const derinYorum = (d) => {
    if (d.insufficient) return null;
    const v = d.volAnnual, m = d.mdd, n = d.n;
    let volTxt, profil;
    if (v < 2) { volTxt = 'çok düşük bir oynaklık'; profil = 'sermaye koruma odaklı, para piyasası benzeri istikrarlı'; }
    else if (v < 10) { volTxt = 'düşük-orta bir oynaklık'; profil = 'dengeli'; }
    else if (v < 25) { volTxt = 'orta-yüksek bir oynaklık'; profil = 'dalgalı'; }
    else { volTxt = 'yüksek bir oynaklık'; profil = 'agresif, hisse ağırlıklı'; }
    let ddTxt;
    if (m > -2) ddTxt = 'incelenen dönemde zirveden kayda değer bir düşüş yaşamamış';
    else if (m > -10) ddTxt = 'görece sınırlı bir düşüş yaşamış';
    else if (m > -25) ddTxt = 'belirgin bir düşüş yaşamış';
    else ddTxt = 'sert bir düşüş yaşamış';
    const yil = (n / 252);
    const sure = yil >= 1 ? `yaklaşık ${yil.toFixed(1)} yıllık` : `${n} iş günlük`;
    // Sonuç cümlesi
    let sonuc;
    if (v < 2 && m > -2) sonuc = 'Riskten kaçınan, nakit benzeri istikrar arayan bir yatırımcı profiline yakındır.';
    else if (v < 10 && m > -10) sonuc = 'Dengeli risk taşıyan, ölçülü dalgalanmaya açık bir profildir.';
    else if (m <= -25) sonuc = 'Yüksek getiri potansiyeli kadar yüksek düşüş riski de barındırır; risk iştahı yüksek yatırımcıya göredir.';
    else sonuc = 'Orta üzeri dalgalanma taşır; düşüş dönemlerine tahammül gerektirir.';
    return `${d.code}, ${sure} fiyat geçmişinde ${volTxt} göstermiş (yıllık ≈${fmtPct2(v)}) — ${profil} bir profil. En kötü döneminde zirveden ${fmtPct2(m)} geriledi (${d.mddPeak} → ${d.mddTrough}); yani ${ddTxt}. ${sonuc}`;
  };

  const fmtNum2 = (v) => (v == null ? '—' : v.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));

  // GEÇMİŞ DEFTERİ — düz işlem listesi (aktif fonlar üstte, sonra en yeni tarih) + parçalı işaretleme
  const islemListesi = useMemo(() => {
    const net = {};
    transactions.forEach((t) => { net[t.fundCode] = (net[t.fundCode] || 0) + (t.type === 'buy' ? parseFloat(t.quantity) : -parseFloat(t.quantity)); });
    const openCodes = new Set(Object.keys(net).filter((c) => net[c] > 0.000001));
    const key = (t) => t.fundCode + '|' + t.date + '|' + t.type;
    const cnt = {};
    transactions.forEach((t) => { cnt[key(t)] = (cnt[key(t)] || 0) + 1; });
    const nameOf = (c) => (definedFunds.find((d) => d.code === c) || {}).name || '';
    return transactions
      .map((t) => ({ ...t, name: nameOf(t.fundCode), open: openCodes.has(t.fundCode), parcali: cnt[key(t)] > 1 }))
      .sort((a, b) => (b.open ? 1 : 0) - (a.open ? 1 : 0) || b.date.localeCompare(a.date) || (b.createdAt || 0) - (a.createdAt || 0));
  }, [transactions, definedFunds]);

  const eldeKalan = useMemo(() => {
    const net = {};
    transactions.forEach((t) => { net[t.fundCode] = (net[t.fundCode] || 0) + (t.type === 'buy' ? parseFloat(t.quantity) : -parseFloat(t.quantity)); });
    return Object.keys(net).map((c) => ({ code: c, net: net[c], open: net[c] > 0.000001 }))
      .sort((a, b) => (b.open ? 1 : 0) - (a.open ? 1 : 0) || a.code.localeCompare(b.code));
  }, [transactions]);

  // Risk-ayarlı getiri için dinamik yorum
  const riskAdjYorum = (d) => {
    if (d.noRf) return 'Önce geçerli bir risksiz getiri oranı girin.';
    if (d.insufficient) return `Seçilen pencerede yeterli veri yok (${d.n} gün). Daha uzun fiyat geçmişi çekin veya pencereyi kısaltın.`;
    const s = d.sharpe;
    const rf = parseTRNumber(rfRate);
    let ana;
    if (s == null) ana = 'Oynaklığı çok düşük olduğu için Sharpe anlamlı hesaplanamadı (neredeyse risksiz bir seyir).';
    else if (s < 0) ana = `Risksiz getirinin (yıllık %${fmtNum2(rf)}) ALTINDA kalmış. Bu dönemde fona girmek yerine risksiz faizde kalmak daha kârlıydı.`;
    else if (s < 1) ana = 'Pozitif ama düşük risk-ayarlı getiri: aldığı dalgalanmaya karşılık getirisi sınırlı kalmış.';
    else if (s < 2) ana = 'İyi bir risk-ayarlı getiri: aldığı riske değen, dengeli bir performans üretmiş.';
    else ana = 'Çok güçlü risk-ayarlı getiri: riske kıyasla istisnai bir performans (nadir görülür).';
    let sort = '';
    if (d.sortinoInf) sort = ' Sortino çok yüksek — incelenen pencerede hedefin altına neredeyse hiç düşmemiş (düşüş riski yok denecek kadar az).';
    else if (d.sortino != null && s != null && d.sortino > s * 1.3) sort = ' Sortino, Sharpe’tan belirgin yüksek: dalgalanmasının çoğu yukarı yönlü, düşüşleri sınırlı olmuş.';
    else if (d.sortino != null && s != null && d.sortino < s * 0.9) sort = ' Sortino, Sharpe’ın altında: dalgalanmasında aşağı yönlü düşüşlerin payı yüksek.';
    return `${d.code} (yıllık getiri ≈${fmtPct2(d.RpAnnual)}, oynaklık ≈${fmtPct2(d.annVol)}). ${ana}${sort}`;
  };

  const sharpeColor = (s) => (s == null ? 'text-slate-400' : s < 0 ? 'text-rose-600' : s < 1 ? 'text-amber-600' : s < 2 ? 'text-emerald-600' : 'text-emerald-700');

  const exportScreener = () => {

    const rows = [header, ...scrFiltered.map((f) => [f.kod, f.ad, f.tur, f.tefas ? 'Gören' : 'Görmeyen', f.risk, f.g1a, f.g3a, f.g6a, f.gyb, f.g1y, f.g3y, f.g5y])];
    try {
      if (window.XLSX) {
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [{ wch: 8 }, { wch: 42 }, { wch: 22 }, { wch: 10 }, { wch: 6 }, { wch: 9 }, { wch: 9 }, { wch: 9 }, { wch: 10 }, { wch: 9 }, { wch: 9 }, { wch: 9 }];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Fon Karşılaştırma');
        XLSX.writeFile(wb, 'fon_karsilastirma.xlsx');
      } else {
        const csv = rows.map((r) => r.join(';')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'fon_karsilastirma.csv'; a.click();
      }
    } catch { showAlert('Hata', 'Dışa aktarma başarısız.'); }
  };
  const scrShown = scrFiltered.slice(0, 600);


  return (

          <div className="flex flex-col">
            <div className="flex items-center gap-2"><PieChart size={28} className="text-indigo-400" /><h1 className="text-2xl font-bold tracking-wide">Fon Getiri Paneli</h1></div>
            <p className="text-xs text-indigo-200 mt-1 opacity-80">Yatırım Fonu Getiri ve Takip Sistemi</p>
          </div>
          <nav className="flex gap-2">
            {[['portfolio', 'Portföyüm', Wallet], ['report', 'Fon Raporu', BarChart3], ['add', 'Yeni Fon Ekle', PlusCircle], ['history', 'Geçmiş Defteri', History]].map(([id, label, Ico]) => (

                          {isOpen && (
                            <tr className="bg-indigo-50/30">
                              <td colSpan="7" className="px-4 pb-4 pt-1">
                                <div className="bg-white border border-indigo-100 rounded-xl p-3 text-sm text-slate-700 leading-relaxed flex gap-2">
                                  <Info size={16} className="text-indigo-500 shrink-0 mt-0.5" />
                                  <div>{derinYorum(d)} <span className="block mt-1 text-[11px] text-slate-400">Bu otomatik yorum geçmiş fiyat verisine dayanır; bilgilendirme amaçlıdır, yatırım tavsiyesi değildir.</span></div>
                                </div>
                              </td>
                            </tr>
                          )}
                          </React.Fragment>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div className="p-4 text-xs text-slate-500 border-t border-slate-100 leading-relaxed">
                  <b className="text-slate-700">Yıllık Volatilite</b>: fiyatın günlük dalgalanmasının yıllığa çevrilmiş hâli (günlük getirilerin std. sapması × √252). Düşük = istikrarlı, yüksek = oynak. Para piyasası fonlarında çok düşüktür (≈%0-2). &nbsp;<b className="text-slate-700">Max Drawdown</b>: geçmişte zirveden dibe yaşanan en büyük yüzdesel düşüş — fonun "en kötü anı". Risk iştahını ölçmek için okunur. &nbsp;<b className="text-slate-700">Dönem Getirisi</b>: eldeki fiyat geçmişinin ilk-son farkı (toplam, yıllık değil).
                </div>
              </div>
              )}

              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mt-6 mb-5">
                <div className="flex items-center gap-2 mb-2"><BarChart3 size={20} className="text-indigo-500" /><h2 className="text-lg font-bold text-slate-800">Risk-Ayarlı Getiri</h2></div>
                <p className="text-sm text-slate-500 leading-relaxed mb-3">Fon, aldığı riske <b>değecek</b> bir getiri üretti mi? <b>Sharpe</b> toplam dalgalanmaya, <b>Sortino</b> yalnızca aşağı yönlü düşüşe göre ölçer. İkisi de fon getirisinden <b>risksiz getiriyi</b> düşer; o yüzden risksiz oranı siz girersiniz.</p>
                <div className="flex flex-wrap items-end gap-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Risksiz Getiri (yıllık %)</label>
                    <input type="text" inputMode="decimal" value={rfRate} onChange={(e) => setRfRate(e.target.value)} placeholder="örn. 50" className="w-32 border border-slate-200 bg-slate-50 rounded-xl px-4 py-2.5 outline-none font-bold text-sm" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Hesap Penceresi</label>
                    <div className="inline-flex bg-slate-100 rounded-xl p-1 gap-1">
                      {[1, 2, 3].map((y) => <button key={y} onClick={() => setRaWindow(y)} className={`px-3 py-1.5 rounded-lg text-sm font-bold ${raWindow === y ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{y} yıl</button>)}
                    </div>
                  </div>
                  <span className="text-xs text-slate-400 pb-2">Risksiz oran için TCMB faizi / gösterge mevduat ya da bir para piyasası fonunun yıllık getirisi kullanılabilir.</span>
                </div>
              </div>

              {riskAdj.length === 0 ? (
                <div className="bg-white rounded-2xl border border-slate-200 p-16 text-center text-slate-400">Önce fiyat geçmişi çekin (yukarıdaki "Fiyat geçmişini güncelle").</div>
              ) : (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse text-sm min-w-[820px]">
                    <thead className="bg-slate-50 text-slate-500 uppercase tracking-wider text-xs border-b border-slate-200">
                      <tr>
                        <th className="p-3">Fon</th>
                        <th className="p-3 text-center">Pencere</th>
                        <th className="p-3 text-right">Yıllık Getiri</th>
                        <th className="p-3 text-right">Yıllık Vol.</th>
                        <th className="p-3 text-right">Sharpe</th>
                        <th className="p-3 text-right">Sortino</th>
                        <th className="p-3 text-center">Yorum</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {riskAdj.map((d) => {
                        const owned = ownedCodes.has(d.code);
                        if (d.noRf) return (<tr key={d.code} className="hover:bg-slate-50"><td className="p-3"><span className="font-extrabold text-indigo-700">{owned && <span className="text-amber-500 mr-1">★</span>}{d.code}</span></td><td className="p-3 text-center text-amber-600" colSpan="6">Risksiz getiri oranını girin (örn. 50)</td></tr>);
                        if (d.insufficient) return (<tr key={d.code} className="hover:bg-slate-50"><td className="p-3"><span className="font-extrabold text-indigo-700">{owned && <span className="text-amber-500 mr-1">★</span>}{d.code}</span> <span className="text-slate-500 text-xs">{d.name}</span></td><td className="p-3 text-center text-slate-400" colSpan="6">Bu pencerede yetersiz veri ({d.n} gün)</td></tr>);
                        const isOpen = raExpanded === d.code;
                        return (
                          <React.Fragment key={d.code}>
                          <tr className={owned ? 'bg-indigo-50/40 hover:bg-indigo-50' : 'hover:bg-slate-50'}>
                            <td className="p-3"><span className="font-extrabold text-indigo-700">{owned && <span className="text-amber-500 mr-1">★</span>}{d.code}</span> <span className="text-slate-500 text-xs max-w-[170px] inline-block truncate align-bottom" title={d.name}>{d.name}</span></td>
                            <td className="p-3 text-center text-slate-400 text-xs whitespace-nowrap">{raWindow} yıl<br />{d.n} gün</td>
                            <td className={`p-3 text-right font-bold ${d.RpAnnual >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{fmtPct2(d.RpAnnual)}</td>
                            <td className="p-3 text-right font-bold text-slate-600">{fmtPct2(d.annVol)}</td>
                            <td className={`p-3 text-right font-extrabold ${sharpeColor(d.sharpe)}`}>{fmtNum2(d.sharpe)}</td>
                            <td className={`p-3 text-right font-extrabold ${d.sortinoInf ? 'text-emerald-700' : sharpeColor(d.sortino)}`}>{d.sortinoInf ? 'Çok yüksek' : fmtNum2(d.sortino)}</td>
                            <td className="p-3 text-center"><button onClick={() => setRaExpanded(isOpen ? null : d.code)} className="text-indigo-600 hover:bg-indigo-50 rounded-lg px-2 py-1 text-xs font-bold whitespace-nowrap">{isOpen ? 'Gizle ▲' : 'Yorum ▼'}</button></td>
                          </tr>
                          {isOpen && (
                            <tr className="bg-indigo-50/30"><td colSpan="7" className="px-4 pb-4 pt-1">
                              <div className="bg-white border border-indigo-100 rounded-xl p-3 text-sm text-slate-700 leading-relaxed flex gap-2">
                                <Info size={16} className="text-indigo-500 shrink-0 mt-0.5" />
                                <div>{riskAdjYorum(d)} <span className="block mt-1 text-[11px] text-slate-400">Otomatik yorum; bilgilendirme amaçlıdır, yatırım tavsiyesi değildir.</span></div>
                              </div>
                            </td></tr>
                          )}
                          </React.Fragment>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div className="p-4 text-xs text-slate-500 border-t border-slate-100 leading-relaxed">
                  <b className="text-slate-700">Sharpe</b> = (yıllık getiri − risksiz getiri) ÷ yıllık oynaklık. <b>1'in üzeri iyi, 2'nin üzeri mükemmel</b>; negatifse risksiz faizde kalmak daha kârlıydı demektir. &nbsp;<b className="text-slate-700">Sortino</b> aynı mantık ama paydada yalnızca <b>aşağı yönlü</b> dalgalanma var (yükselişleri cezalandırmaz); genelde Sharpe'tan yüksek çıkar, ne kadar yüksekse düşüşlere o kadar dirençlidir.
                </div>
              </div>
              )}

            </div>
            )}
          </div>
        )}

        {modalConfig.isOpen && (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
            <div className="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
              <h3 className="text-xl font-bold text-slate-800 mb-2">{modalConfig.title}</h3>
              <p className="text-slate-600 mb-6">{modalConfig.message}</p>
              <div className="flex justify-end gap-3">
                {!modalConfig.isAlert && <button onClick={() => setModalConfig({ ...modalConfig, isOpen: false })} className="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg font-medium">İptal</button>}
                <button onClick={() => { if (modalConfig.onConfirm) modalConfig.onConfirm(); else setModalConfig({ ...modalConfig, isOpen: false }); }} className={`px-4 py-2 text-white rounded-lg font-medium ${modalConfig.isAlert ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-rose-600 hover:bg-rose-700'}`}>{modalConfig.isAlert ? 'Tamam' : 'Onayla ve Sil'}</button>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
