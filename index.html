const { useState, useMemo, useEffect } = React;

/* ===== Proxy: aynı Vercel projesinde /api/tefas olduğu için göreli adres ===== */
const CUSTOM_PROXY = '/api/tefas';
const PERIYOD = 12;

function parseTefasResult(data) {
  const list = data && Array.isArray(data.resultList) ? data.resultList : [];
  if (!list.length) return null;
  const history = list
    .map((x) => ({ date: String(x.tarih).slice(0, 10), price: Number(x.fiyat) }))
    .filter((h) => h.date && h.price > 0)
    .sort((a, b) => a.date.localeCompare(b.date));
  if (!history.length) return null;
  const latest = history[history.length - 1];
  return { price: latest.price, date: latest.date, name: (list[0] && list[0].fonUnvan) || null, history };
}

async function fetchTefasFund(code) {
  try {
    const base = CUSTOM_PROXY.replace(/\/+$/, '');
    const sep = base.includes('?') ? '&' : '?';
    const res = await fetch(`${base}${sep}fon=${encodeURIComponent(code)}&periyod=${PERIYOD}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if (d && Number(d.price) > 0) {
      const history = Array.isArray(d.history) && d.history.length
        ? d.history.map((h) => ({ date: h.date, price: Number(h.price) })).filter((h) => h.price > 0)
        : [{ date: d.date, price: Number(d.price) }];
      return { price: Number(d.price), date: d.date, name: d.name || null, history };
    }
  } catch (e) { /* yut */ }
  return null;
}

/* ===== Kalıcı depo: localStorage ===== */
const load = (k, fb) => { try { const v = localStorage.getItem('fgp_' + k); return v ? JSON.parse(v) : fb; } catch { return fb; } };

/* ===== Getiri hesaplama yardımcıları ===== */
const minusMonths = (iso, n) => { const d = new Date(iso); d.setMonth(d.getMonth() - n); return d.toISOString().slice(0, 10); };
const minusDays = (iso, n) => { const d = new Date(iso); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); };
// hist ARTAN sıralı; tarihi <= target olan SON kayıt
const priceOnOrBefore = (hist, target) => { let r = null; for (const h of hist) { if (h.date <= target) r = h; else break; } return r; };
// tarihi >= target olan İLK kayıt
const firstOnOrAfter = (hist, target) => { for (const h of hist) { if (h.date >= target) return h; } return null; };

function computeReturns(hist) {
  if (!hist || hist.length < 2) return null;
  const latest = hist[hist.length - 1];
  const prev = hist[hist.length - 2];
  const year = latest.date.slice(0, 4);
  const pct = (baseEntry) => {
    if (!baseEntry || !baseEntry.value) return null;
    return ((latest.value - baseEntry.value) / baseEntry.value) * 100;
  };
  return {
    son: latest,
    gunluk: pct(prev),
    hafta: pct(priceOnOrBefore(hist, minusDays(latest.date, 7)) || hist[0]),
    ay1: pct(priceOnOrBefore(hist, minusMonths(latest.date, 1)) || hist[0]),
    ay3: pct(priceOnOrBefore(hist, minusMonths(latest.date, 3)) || hist[0]),
    ay6: pct(priceOnOrBefore(hist, minusMonths(latest.date, 6)) || hist[0]),
    ytd: pct(firstOnOrAfter(hist, `${year}-01-01`) || hist[0]),
    yil1: pct(priceOnOrBefore(hist, minusMonths(latest.date, 12)) || hist[0]),
  };
}

function filterByPeriod(hist, period) {
  if (!hist || !hist.length) return [];
  const latest = hist[hist.length - 1];
  let cutoff;
  if (period === 'w') cutoff = minusDays(latest.date, 7);
  else if (period === 'm') cutoff = minusMonths(latest.date, 1);
  else if (period === '3m') cutoff = minusMonths(latest.date, 3);
  else if (period === '6m') cutoff = minusMonths(latest.date, 6);
  else if (period === 'ytd') cutoff = `${latest.date.slice(0, 4)}-01-01`;
  else cutoff = minusMonths(latest.date, 12); // 1y
  return hist.filter((h) => h.date >= cutoff);
}

/* ===== Basit SVG fiyat grafiği (dış kütüphane yok) ===== */
function PriceChart({ data }) {
  if (!data || data.length < 2) return <div className="text-sm text-slate-400 italic py-16 text-center">Grafik için yeterli veri yok.</div>;
  const W = 820, H = 320, padL = 64, padR = 18, padT = 18, padB = 38;
  const vals = data.map((d) => d.value);
  let min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) { min *= 0.999; max *= 1.001; }
  const xAt = (i) => padL + (W - padL - padR) * (data.length === 1 ? 0 : i / (data.length - 1));
  const yAt = (v) => padT + (H - padT - padB) * (1 - (v - min) / (max - min));
  const pts = data.map((d, i) => `${xAt(i).toFixed(1)},${yAt(d.value).toFixed(1)}`).join(' ');
  const area = `${xAt(0).toFixed(1)},${H - padB} ${pts} ${xAt(data.length - 1).toFixed(1)},${H - padB}`;
  const up = data[data.length - 1].value >= data[0].value;
  const stroke = up ? '#059669' : '#e11d48';
  const fill = up ? 'rgba(5,150,105,0.10)' : 'rgba(225,29,72,0.10)';
  const fmtN = (v) => v.toLocaleString('tr-TR', { maximumFractionDigits: 4 });
  const fmtD = (s) => new Date(s).toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  const yTicks = [max, (max + min) / 2, min];
  const xIdx = [0, Math.floor((data.length - 1) / 2), data.length - 1];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block' }}>
      {yTicks.map((v, i) => {
        const y = yAt(v);
        return (
          <g key={i}>
            <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="#e2e8f0" strokeWidth="1" />
            <text x={padL - 8} y={y + 4} textAnchor="end" fontSize="11" fill="#94a3b8">{fmtN(v)}</text>
          </g>
        );
      })}
      <polygon points={area} fill={fill} />
      <polyline points={pts} fill="none" stroke={stroke} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {xIdx.map((i, k) => (
        <text key={k} x={xAt(i)} y={H - padB + 22} textAnchor={k === 0 ? 'start' : k === xIdx.length - 1 ? 'end' : 'middle'} fontSize="11" fill="#94a3b8">{fmtD(data[i].date)}</text>
      ))}
    </svg>
  );
}

const SEED_FUNDS = [{ code: 'GAL', name: 'GARANTİ PORTFÖY İKİNCİ PARA PİYASASI (TL) FONU' }];

function App() {
  const [activeTab, setActiveTab] = useState('portfolio');
  const [transactions, setTransactions] = useState(() => load('transactions', []));
  const [definedFunds, setDefinedFunds] = useState(() => load('definedFunds', SEED_FUNDS));
  const [priceHistory, setPriceHistory] = useState(() => load('priceHistory', {}));

  useEffect(() => save('transactions', transactions), [transactions]);
  useEffect(() => save('definedFunds', definedFunds), [definedFunds]);
  useEffect(() => save('priceHistory', priceHistory), [priceHistory]);

  const newId = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());

  const marketPrices = useMemo(() => {
    const m = {};
    Object.entries(priceHistory).forEach(([code, arr]) => {
      if (arr && arr.length) {
        const latest = [...arr].sort((a, b) => b.date.localeCompare(a.date))[0];
        m[code] = { value: latest.value, date: latest.date };
      }
    });
    return m;
  }, [priceHistory]);

  const [newFundCode, setNewFundCode] = useState('');
  const [newFundName, setNewFundName] = useState('');
  const [txType, setTxType] = useState('buy');
  const [fundCode, setFundCode] = useState('');
  const [txDate, setTxDate] = useState(new Date().toISOString().split('T')[0]);
  const [txPrice, setTxPrice] = useState('');
  const [txTotalAmount, setTxTotalAmount] = useState('');
  const [priceUpdateFund, setPriceUpdateFund] = useState('');
  const [priceUpdateDate, setPriceUpdateDate] = useState(new Date().toISOString().split('T')[0]);
  const [priceUpdateValue, setPriceUpdateValue] = useState('');
  const [editingPrice, setEditingPrice] = useState(null);
  const [tempPrice, setTempPrice] = useState('');
  const [historyViewFund, setHistoryViewFund] = useState('');
  const [reportFund, setReportFund] = useState('');
  const [reportPeriod, setReportPeriod] = useState('1y');
  const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', onConfirm: null, isAlert: true });
  const [isFetching, setIsFetching] = useState(false);

  const showAlert = (title, message) => setModalConfig({ isOpen: true, title, message, onConfirm: null, isAlert: true });
  const showConfirm = (title, message, onConfirm) => setModalConfig({ isOpen: true, title, message, onConfirm, isAlert: false });

  const calculatedQty = useMemo(() => {
    const p = parseFloat(txPrice), t = parseFloat(txTotalAmount);
    if (!isNaN(p) && !isNaN(t) && p > 0) return (t / p).toFixed(6);
    return '0.000000';
  }, [txPrice, txTotalAmount]);

  const portfolio = useMemo(() => {
    const holdings = {};
    transactions.forEach((t) => {
      if (!holdings[t.fundCode]) holdings[t.fundCode] = { code: t.fundCode, quantity: 0, totalCost: 0 };
      const h = holdings[t.fundCode];
      const qty = parseFloat(t.quantity), prc = parseFloat(t.price);
      if (t.type === 'buy') { h.quantity += qty; h.totalCost += qty * prc; }
      else if (t.type === 'sell') { const avgCost = h.quantity > 0 ? h.totalCost / h.quantity : 0; h.quantity -= qty; h.totalCost -= qty * avgCost; }
    });
    return Object.values(holdings).filter((h) => h.quantity > 0.001).map((h) => {
      const avgCost = h.totalCost / h.quantity;
      const marketData = marketPrices[h.code] || { value: avgCost, date: null };
      const currentValue = h.quantity * marketData.value;
      const profitLoss = currentValue - h.totalCost;
      const fundDetails = definedFunds.find((f) => f.code === h.code);
      return { ...h, name: fundDetails ? fundDetails.name : '', avgCost, currentPrice: marketData.value, priceDate: marketData.date, currentValue, profitLoss, profitLossPercent: h.totalCost > 0 ? (profitLoss / h.totalCost) * 100 : 0 };
    });
  }, [transactions, marketPrices, definedFunds]);

  const summary = useMemo(() => {
    let totalValue = 0, totalCost = 0;
    portfolio.forEach((i) => { totalValue += i.currentValue; totalCost += i.totalCost; });
    const netProfit = totalValue - totalCost;
    return { totalValue, totalCost, netProfit, netProfitPercent: totalCost > 0 ? (netProfit / totalCost) * 100 : 0 };
  }, [portfolio]);

  const handleAddTransaction = (e) => {
    e.preventDefault();
    if (!fundCode || !txPrice || !txTotalAmount) { showAlert('Eksik Bilgi', 'Lütfen Fon, Fiyat ve Tutar alanlarını doldurun.'); return; }
    const qty = parseFloat(calculatedQty);
    if (qty <= 0) { showAlert('Geçersiz Değer', 'Hesaplanan adet sıfırdan büyük olmalıdır.'); return; }
    if (txType === 'sell') {
      const owned = (portfolio.find((p) => p.code === fundCode) || {}).quantity || 0;
      if (qty > owned + 1e-6) { showAlert('Yetersiz Bakiye', `Elinizde ${fundCode} fonundan yalnızca ${owned.toFixed(6)} adet var.`); return; }
    }
    setTransactions((prev) => [...prev, { id: newId(), type: txType, fundCode, quantity: qty, price: parseFloat(txPrice), totalAmount: parseFloat(txTotalAmount), date: txDate, createdAt: Date.now() }]);
    setFundCode(''); setTxPrice(''); setTxTotalAmount('');
  };

  const handleAddDefinedFund = (e) => {
    e.preventDefault();
    const code = newFundCode.toUpperCase(), name = newFundName.toUpperCase();
    if (code && name && !definedFunds.find((f) => f.code === code)) {
      setDefinedFunds((prev) => [...prev, { code, name }]); setNewFundCode(''); setNewFundName('');
      showAlert('Başarılı', `${code} fonu listeye eklendi!`);
    } else if (definedFunds.find((f) => f.code === code)) showAlert('Hata', 'Bu fon kodu zaten tanımlı!');
  };

  const handleDeleteDefinedFund = (code) => {
    if (transactions.some((t) => t.fundCode === code)) { showAlert('İşlem Engellendi', 'Bu fona ait işlem kayıtları var. Önce "Geçmiş Defteri"nden o işlemleri silin.'); return; }
    showConfirm('Fonu Sil', `${code} kodlu fonu silmek istediğinize emin misiniz? (Fiyat geçmişi korunur.)`, () => { setDefinedFunds((prev) => prev.filter((f) => f.code !== code)); setModalConfig({ isOpen: false }); });
  };

  const addPriceRecords = (code, records) => {
    setPriceHistory((prev) => {
      const byDate = new Map((prev[code] || []).map((r) => [r.date, r.value]));
      records.forEach((r) => { if (r && r.value > 0 && r.date) byDate.set(r.date, r.value); });
      return { ...prev, [code]: Array.from(byDate, ([date, value]) => ({ date, value })).sort((a, b) => a.date.localeCompare(b.date)) };
    });
  };

  const handleDailyPriceUpdate = (e) => {
    e.preventDefault();
    if (!priceUpdateFund || !priceUpdateValue) return;
    addPriceRecords(priceUpdateFund, [{ date: priceUpdateDate, value: parseFloat(priceUpdateValue) }]);
    setPriceUpdateValue('');
    showAlert('Fiyat Kaydedildi', `${priceUpdateFund} fonu ${priceUpdateDate} tarihli fiyatıyla geçmişe eklendi!`);
  };

  const handleTablePriceUpdate = (code) => {
    const val = parseFloat(tempPrice);
    if (!isNaN(val) && val > 0) addPriceRecords(code, [{ date: new Date().toISOString().split('T')[0], value: val }]);
    setEditingPrice(null);
  };

  const handleAutoFetch = async () => {
    if (definedFunds.length === 0) { showAlert('Bilgi', 'Tanımlı fon yok.'); return; }
    setIsFetching(true);
    const today = new Date().toISOString().split('T')[0];
    const histUpdates = {}, nameUpdates = {}, failed = []; let updated = 0;
    for (const fund of definedFunds) {
      try {
        const r = await fetchTefasFund(fund.code);
        if (r && r.price > 0) {
          histUpdates[fund.code] = (r.history && r.history.length ? r.history.map((h) => ({ date: h.date, value: h.price })) : [{ date: r.date || today, value: r.price }]);
          if (r.name) nameUpdates[fund.code] = r.name;
          updated++;
        } else failed.push(fund.code);
      } catch (err) { failed.push(fund.code); }
    }
    if (Object.keys(histUpdates).length) {
      setPriceHistory((prev) => {
        const next = { ...prev };
        Object.entries(histUpdates).forEach(([code, recs]) => {
          const byDate = new Map((next[code] || []).map((x) => [x.date, x.value]));
          recs.forEach((x) => { if (x.value > 0 && x.date) byDate.set(x.date, x.value); });
          next[code] = Array.from(byDate, ([date, value]) => ({ date, value })).sort((a, b) => a.date.localeCompare(b.date));
        });
        return next;
      });
    }
    if (Object.keys(nameUpdates).length) setDefinedFunds((prev) => prev.map((f) => (nameUpdates[f.code] ? { ...f, name: nameUpdates[f.code] } : f)));
    setIsFetching(false);
    if (updated === 0) showAlert('Veri Çekilemedi', `Hiçbir fon güncellenemedi (${failed.join(', ')}). Fon kodlarını kontrol edin; TEFAS dakikada ~6 istek sınırı koyuyor, birkaç saniye sonra tekrar deneyin.`);
    else if (failed.length) showAlert('Kısmi Güncelleme', `${updated} fon güncellendi. Çekilemeyenler: ${failed.join(', ')}.`);
    else showAlert('Başarılı!', `Tüm fonların (${updated} adet) fiyatları TEFAS'tan çekildi ve geçmişe eklendi!`);
  };

  const handleDeleteTransaction = (id) => {
    showConfirm('İşlemi Sil', 'Bu işlemi silmek istediğinize emin misiniz? (Fiyat geçmişi etkilenmez.)', () => { setTransactions((prev) => prev.filter((t) => t.id !== id)); setModalConfig({ isOpen: false }); });
  };

  const fmtCur = (v) => new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(v);
  const fmtPrice = (v) => new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', minimumFractionDigits: 6, maximumFractionDigits: 6 }).format(v);
  const fmtQty = (v) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 6 }).format(v);

  const selectedHistory = historyViewFund && priceHistory[historyViewFund] ? [...priceHistory[historyViewFund]].sort((a, b) => b.date.localeCompare(a.date)) : [];

  // --- Rapor verileri ---
  const reportHist = reportFund && priceHistory[reportFund] ? [...priceHistory[reportFund]].sort((a, b) => a.date.localeCompare(b.date)) : [];
  const reportReturns = useMemo(() => computeReturns(reportHist), [reportFund, priceHistory]);
  const reportChartData = useMemo(() => filterByPeriod(reportHist, reportPeriod), [reportFund, reportPeriod, priceHistory]);
  const reportFundName = (definedFunds.find((f) => f.code === reportFund) || {}).name || '';

  const exportExcel = () => {
    if (!reportFund || reportHist.length === 0) { showAlert('Veri Yok', 'Önce bir fon seçin ve fiyat geçmişi çekin.'); return; }
    const rows = [['Tarih', 'Fiyat (TL)', 'Günlük Getiri (%)']];
    reportHist.forEach((r, i) => {
      const prev = reportHist[i - 1];
      const chg = prev && prev.value ? ((r.value - prev.value) / prev.value) * 100 : '';
      rows.push([r.date, r.value, chg === '' ? '' : Number(chg.toFixed(4))]);
    });
    const fname = `${reportFund}_fiyat_gecmisi.xlsx`;
    try {
      if (window.XLSX) {
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [{ wch: 12 }, { wch: 14 }, { wch: 16 }];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, reportFund.slice(0, 28));
        XLSX.writeFile(wb, fname);
      } else {
        // SheetJS yüklenmediyse CSV'ye düş (Excel açar)
        const csv = rows.map((r) => r.join(';')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fname.replace('.xlsx', '.csv');
        a.click();
      }
    } catch (e) {
      showAlert('Hata', 'Dışa aktarma sırasında bir sorun oluştu.');
    }
  };

  const fmtPct = (v) => (v == null ? '-' : `${v > 0 ? '+' : ''}${v.toLocaleString('tr-TR', { maximumFractionDigits: 2 })}%`);

  return (
    <div className="min-h-screen bg-[#f3f4f6] text-slate-800 pb-12">
      <header className="bg-[#1e1b4b] text-white border-b border-indigo-900 shadow-md sticky top-0 z-10">
        <div className="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">

              </div>
            ) : reportHist.length < 2 ? (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-16 text-center text-slate-400">
                Bu fon için yeterli fiyat verisi yok. "Portföyüm" sekmesinden <strong>TEFAS Canlı Veri Çek</strong>'e basın.
              </div>
            ) : (
              <>
                {/* Üst bilgi şeridi */}
                <div className="bg-[#1e1b4b] rounded-2xl p-5 mb-6 text-white shadow-md flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                  <div>
                    <div className="text-2xl font-extrabold tracking-wide">{reportFund}</div>
                    <div className="text-xs text-indigo-200 max-w-md">{reportFundName}</div>
                  </div>
                  <div className="flex gap-6">
                    <div className="text-right">
                      <div className="text-xs text-indigo-300 uppercase font-bold">Son Fiyat</div>
                      <div className="text-xl font-bold">{fmtPrice(reportReturns.son.value)}</div>
                      <div className="text-[11px] text-indigo-300">{new Date(reportReturns.son.date).toLocaleDateString('tr-TR')}</div>
                    </div>
                    <div className="text-right">
                      <div className="text-xs text-indigo-300 uppercase font-bold">Günlük Getiri</div>
                      <div className={`text-xl font-bold ${reportReturns.gunluk >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{fmtPct(reportReturns.gunluk)}</div>
                    </div>
                  </div>
                </div>

                {/* Grafik */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
                  <div className="flex items-center gap-2 mb-4"><TrendingUp size={18} className="text-indigo-500" /><h3 className="text-lg font-bold text-slate-800">Fon Fiyat Grafiği</h3></div>
                  <div className="flex flex-wrap gap-1 bg-slate-100 p-1 rounded-xl mb-5 w-fit">
                    {[['w', 'Haftalık'], ['m', 'Aylık'], ['3m', '3 Aylık'], ['6m', '6 Aylık'], ['ytd', 'Yılbaşından'], ['1y', '1 Yıllık']].map(([p, label]) => (
                      <button key={p} onClick={() => setReportPeriod(p)} className={`px-3 py-1.5 text-xs font-semibold rounded-lg transition-colors ${reportPeriod === p ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{label}</button>
                    ))}
                  </div>
                  <PriceChart data={reportChartData} />
                </div>

                {/* Getiri bilgisi kartları */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                  <h3 className="text-lg font-bold text-slate-800 mb-4">Getiri Bilgisi</h3>
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                    {[['Son 1 Hafta', reportReturns.hafta], ['Son 1 Ay', reportReturns.ay1], ['Son 3 Ay', reportReturns.ay3], ['Son 6 Ay', reportReturns.ay6], ['Yılbaşından', reportReturns.ytd], ['Son 1 Yıl', reportReturns.yil1]].map(([label, val], i) => (
                      <div key={i} className="border border-slate-100 rounded-xl p-4 bg-slate-50/50">
                        <div className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">{label}</div>
                        <div className={`text-lg font-bold ${val == null ? 'text-slate-400' : val >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{fmtPct(val)}</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-[11px] text-slate-400 mt-4 border-l-2 border-indigo-200 pl-2">Getiriler, panelin kayıtlı fiyat geçmişinden hesaplanır. Daha uzun/eksiksiz geçmiş için "TEFAS Canlı Veri Çek" butonunu kullanın. "Excel'e Aktar" tüm günlük kayıtları indirir.</p>
                </div>
              </>
            )}
          </div>
        )}

        {modalConfig.isOpen && (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
            <div className="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
              <h3 className="text-xl font-bold text-slate-800 mb-2">{modalConfig.title}</h3>
              <p className="text-slate-600 mb-6">{modalConfig.message}</p>
              <div className="flex justify-end gap-3">
                {!modalConfig.isAlert && <button onClick={() => setModalConfig({ ...modalConfig, isOpen: false })} className="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg font-medium">İptal</button>}
                <button onClick={() => { if (modalConfig.onConfirm) modalConfig.onConfirm(); else setModalConfig({ ...modalConfig, isOpen: false }); }} className={`px-4 py-2 text-white rounded-lg font-medium ${modalConfig.isAlert ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-rose-600 hover:bg-rose-700'}`}>{modalConfig.isAlert ? 'Tamam' : 'Onayla ve Sil'}</button>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
